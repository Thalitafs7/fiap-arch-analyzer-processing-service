# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — DO NOT COMMIT REAL VALUES
#
# This file documents the shape of the `processing-secret` Kubernetes Secret
# that is materialised at runtime by the `secrets-sync` init container.
#
# The init container fetches the following AWS Secrets Manager paths and writes
# their JSON payloads to /secrets/ (emptyDir{medium: Memory}):
#
#   arch-analyzer/db/processing   → POSTGRES_CONNECTION_STRING
#   arch-analyzer/redis/password  → REDIS_URL
#   arch-analyzer/llm/keys        → OPENAI_API_KEY, ANTHROPIC_API_KEY
#
# The orchestrator (scripts/deploy-all.ps1 / .sh) creates this Secret from the
# fetched values before applying the Deployment manifests.
#
# To create manually (for local dev / first-time bootstrap):
#
#   kubectl create secret generic processing-secret \
#     --namespace arch-analyzer-ia \
#     --from-literal=POSTGRES_CONNECTION_STRING="postgresql://user:pass@host:5432/db" \
#     --from-literal=REDIS_URL="redis://:password@redis.data.svc.cluster.local:6379/0" \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..."
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: processing-secret
  namespace: arch-analyzer-ia
type: Opaque
stringData:
  # PostgreSQL connection string for the processing service DB user
  # Source: arch-analyzer/db/processing (Secrets Manager)
  POSTGRES_CONNECTION_STRING: "REPLACE_WITH_ACTUAL_VALUE"

  # Redis connection URL including AUTH password
  # Source: arch-analyzer/redis/password (Secrets Manager)
  # Format: redis://:<password>@redis.data.svc.cluster.local:6379/0
  REDIS_URL: "REPLACE_WITH_ACTUAL_VALUE"

  # OpenAI API key for LLM vision + embedding calls
  # Source: arch-analyzer/llm/keys (Secrets Manager) → key: OPENAI_API_KEY
  OPENAI_API_KEY: "REPLACE_WITH_ACTUAL_VALUE"

  # Anthropic API key for Claude model calls
  # Source: arch-analyzer/llm/keys (Secrets Manager) → key: ANTHROPIC_API_KEY
  ANTHROPIC_API_KEY: "REPLACE_WITH_ACTUAL_VALUE"
