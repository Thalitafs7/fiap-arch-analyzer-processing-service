apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: arch-analyzer-ia
  labels:
    app.kubernetes.io/name: celery-worker
    app.kubernetes.io/part-of: arch-analyzer
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
        app.kubernetes.io/name: celery-worker
        app.kubernetes.io/part-of: arch-analyzer
        app.kubernetes.io/component: worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        fsGroup: 10000

      volumes:
        - name: secrets-vol
          emptyDir:
            medium: Memory

      initContainers:
        - name: secrets-sync
          image: amazon/aws-cli:2.15.0
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # Fetch DB credentials for processing service
              DB_SECRET=$(aws secretsmanager get-secret-value \
                --secret-id arch-analyzer/db/processing \
                --query SecretString \
                --output text)
              echo "$DB_SECRET" > /secrets/db.json

              # Fetch Redis password
              REDIS_SECRET=$(aws secretsmanager get-secret-value \
                --secret-id arch-analyzer/redis/password \
                --query SecretString \
                --output text)
              echo "$REDIS_SECRET" > /secrets/redis.json

              # Fetch LLM API keys (OpenAI, Anthropic, etc.)
              LLM_SECRET=$(aws secretsmanager get-secret-value \
                --secret-id arch-analyzer/llm/keys \
                --query SecretString \
                --output text)
              echo "$LLM_SECRET" > /secrets/llm.json
          volumeMounts:
            - name: secrets-vol
              mountPath: /secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: celery-worker
          image: arch-analyzer-processing:latest
          # Same image as processing-service; resolved via kustomization.yaml images override:
          #   newName: ${ECR_REGISTRY}/arch-analyzer-processing
          #   newTag:  ${IMAGE_TAG}
          command:
            - celery
            - -A
            - worker
            - worker
            - --loglevel=INFO
            - --concurrency=2

          envFrom:
            - configMapRef:
                name: infra-outputs # AWS_REGION, DB_ADDRESS, SQS_PROCESSING_QUEUE_URL, S3_DIAGRAMS_BUCKET, ECR_*, etc.
            - configMapRef:
                name: processing-config # LLM model IDs, Celery queue names, non-sensitive app config
            - secretRef:
                name: processing-secret # POSTGRES_CONNECTION_STRING, REDIS_URL, OPENAI_API_KEY, ANTHROPIC_API_KEY

          # Cherry-pick specific keys from infra-outputs under canonical env var names
          env:
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: infra-outputs
                  key: SQS_PROCESSING_QUEUE_URL
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: infra-outputs
                  key: S3_DIAGRAMS_BUCKET

          volumeMounts:
            - name: secrets-vol
              mountPath: /secrets
              readOnly: true

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

# NOTE: No Service, Ingress, or HorizontalPodAutoscaler for celery-worker.
# Workers are scaled independently via queue depth (KEDA) or manual replicas.
