apiVersion: v1
kind: ConfigMap
metadata:
  name: processing-config
  namespace: arch-analyzer-ia
data:
  # ── Application environment ──────────────────────────────────────────────────
  APP_ENV: "production"
  LOG_LEVEL: "INFO"

  # ── LLM model configuration (non-sensitive model IDs only) ──────────────────
  OPENAI_MODEL: "gpt-4o"
  ANTHROPIC_MODEL: "claude-3-5-sonnet-20241022"
  EMBEDDING_MODEL: "text-embedding-3-small"
  EMBEDDING_DIMENSIONS: "1536"

  # ── Celery / task queue configuration ───────────────────────────────────────
  CELERY_TASK_QUEUE: "arch-analyzer-tasks"
  CELERY_RESULT_BACKEND_DB: "0"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "100"

  # ── Analysis pipeline settings ───────────────────────────────────────────────
  MAX_DIAGRAM_SIZE_MB: "10"
  ANALYSIS_TIMEOUT_SECONDS: "300"
  RAG_TOP_K: "5"

  # NOTE: AWS Terraform outputs (DB_ADDRESS, SQS_PROCESSING_QUEUE_URL,
  # S3_DIAGRAMS_BUCKET, ECR_REGISTRY, etc.) are consumed via
  # envFrom: configMapRef: { name: infra-outputs } in the Deployment.
  # Never inline AWS literal values here.
