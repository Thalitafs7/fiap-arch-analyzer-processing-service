apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: processing-hpa
  namespace: arch-analyzer-ia
spec:
  # Scoped to processing-service Deployment only — celery-worker is NOT included
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: processing-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
